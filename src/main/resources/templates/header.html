                <div class="logged-in d-none">
                    <span class="navbar-text me-3 username"></span>
                    <button class="btn btn-outline-danger" id="logout-btn">Logout</button>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Check if user is logged in
        const token = localStorage.getItem('token');
        const tokenExpiry = localStorage.getItem('tokenExpiry');
        
        if (token && tokenExpiry && new Date().getTime() < parseInt(tokenExpiry)) {
            // User is logged in
            document.querySelector('.logged-out').classList.add('d-none');
            document.querySelector('.logged-in').classList.remove('d-none');
            
            // Decode the JWT to get the username
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.querySelector('.username').textContent = payload.sub || 'User';
                
                // Show admin elements if user has admin role
                if (payload.groups && payload.groups.includes('ROLE_ADMIN')) {
                    document.querySelectorAll('.admin-only').forEach(el => {
                        el.classList.remove('d-none');
                    });
                }
            } catch (e) {
                console.error('Error decoding JWT', e);
            }
        } else {
            // User is not logged in or token expired
            document.querySelector('.logged-out').classList.remove('d-none');
            document.querySelector('.logged-in').classList.add('d-none');
            
            // Hide admin elements
            document.querySelectorAll('.admin-only').forEach(el => {
                el.classList.add('d-none');
            });
            
            // Clear expired token
            if (token && tokenExpiry && new Date().getTime() >= parseInt(tokenExpiry)) {
                localStorage.removeItem('token');
                localStorage.removeItem('tokenExpiry');
            }
        }
        
        // Logout button
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('tokenExpiry');
            window.location.href = '/';
        });
    });
</script>
